<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background-color:#1e1e1e; font-family:Arial, sans-serif;">
  <!-- Definitions -->
  <defs>
    <linearGradient id="grad_box" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Header -->
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">FONROCHE BIOPOMERIA - SYNOPTIQUE</text>
  <line x1="50" y1="60" x2="750" y2="60" stroke="#444" stroke-width="2" />

  <!-- Main Flow Pipe -->
  <path d="M 50 250 L 250 250 L 350 250 L 550 250 L 750 250" stroke="#444" stroke-width="10" fill="none" />
  <path id="pipe_out" d="M 550 250 L 750 250" stroke="#555" stroke-width="6" fill="none" />

  <!-- ZONE 1: ADMISSION -->
  <g transform="translate(50, 150)">
    <rect width="180" height="200" rx="10" fill="url(#grad_box)" stroke="#666" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" fill="#aaa" font-weight="bold">1. ADMISSION</text>
    
    <text x="20" y="80" fill="#ccc" font-size="12">Débit Brut:</text>
    <text id="val_flow_in" x="160" y="80" text-anchor="end" fill="#00ffff" font-size="16" font-weight="bold">--</text>
    
    <text x="20" y="120" fill="#ccc" font-size="12">Pression:</text>
    <text id="val_press_in" x="160" y="120" text-anchor="end" fill="#fff" font-size="16">--</text>
  </g>

  <!-- ZONE 2: COMPRESSION -->
  <g transform="translate(250, 150)">
    <rect width="180" height="200" rx="10" fill="url(#grad_box)" stroke="#666" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" fill="#aaa" font-weight="bold">2. COMPRESSION</text>
    
    <!-- Fan Icon -->
    <circle cx="90" cy="100" r="30" stroke="#888" fill="none" />
    <g id="fan_blade" transform="translate(50, 100)"> <!-- Adjusted via JS transform origin -->
       <path d="M 260 250 L 340 250" stroke="#888" stroke-width="4" transform="translate(-300, -250)" /> 
       <path d="M 300 210 L 300 290" stroke="#888" stroke-width="4" transform="translate(-300, -250)" />
    </g>

    <text x="20" y="160" fill="#ccc" font-size="12">Puissance:</text>
    <text id="val_comp_pwr" x="160" y="160" text-anchor="end" fill="#ffcc00" font-size="16">--</text>
    
    <text x="20" y="185" fill="#ccc" font-size="12">Pression Sortie:</text>
    <text id="val_comp_press" x="160" y="185" text-anchor="end" fill="#fff" font-size="16">--</text>
  </g>

  <!-- ZONE 3: EPURATION -->
  <g transform="translate(450, 150)">
    <rect width="180" height="200" rx="10" fill="url(#grad_box)" stroke="#666" stroke-width="2" />
    <text x="90" y="30" text-anchor="middle" fill="#aaa" font-weight="bold">3. EPURATION</text>
    
    <text x="20" y="80" fill="#ccc" font-size="12">Temp Process:</text>
    <text id="val_temp_proc" x="160" y="80" text-anchor="end" fill="#fff" font-size="16">--</text>
    
    <text x="20" y="120" fill="#ccc" font-size="12">CO2 (Brut?):</text>
    <text id="val_co2_raw" x="160" y="120" text-anchor="end" fill="#ff5555" font-size="16">--</text>
  </g>

  <!-- ZONE 4: INJECTION / QUALITE -->
  <g transform="translate(650, 150)">
    <rect width="120" height="200" rx="10" fill="url(#grad_box)" stroke="#666" stroke-width="2" />
    <text x="60" y="30" text-anchor="middle" fill="#aaa" font-weight="bold">4. QUALITÉ</text>
    
    <text x="60" y="70" text-anchor="middle" fill="#ccc" font-size="12">CH4</text>
    <text id="val_ch4" x="60" y="100" text-anchor="middle" fill="#00ff00" font-size="22" font-weight="bold" filter="url(#glow)">--</text>
    
    <text x="60" y="140" text-anchor="middle" fill="#ccc" font-size="12">Cadence</text>
    <text id="val_cadence" x="60" y="160" text-anchor="middle" fill="#fff" font-size="16">--</text>
  </g>

  <!-- STATUS BAR -->
  <g transform="translate(50, 400)">
    <text x="0" y="20" fill="#fff">STATUS:</text>
    
    <circle id="led_run" cx="80" cy="15" r="10" fill="#555" stroke="#333" />
    <text x="100" y="20" fill="#aaa" font-size="12">En Marche</text>
    
    <circle id="led_inj" cx="200" cy="15" r="10" fill="#555" stroke="#333" />
    <text x="220" y="20" fill="#aaa" font-size="12">Injection</text>
    
    <circle id="led_fault" cx="320" cy="15" r="10" fill="#555" stroke="#333" />
    <text x="340" y="20" fill="#aaa" font-size="12">Défaut</text>
  </g>

</svg>