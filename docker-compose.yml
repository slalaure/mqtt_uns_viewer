version: '3.8'
services:
  # Service 1: The main web application (server.js)
  app:
    build:
      context: .
    container_name: korelate_app
    restart: always
    ports:
      - "8080:8080" # Expose web app on port 8080 of the host
    volumes:
      # Mount 'data' folder for persistence
      - ./data:/usr/src/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - BASE_PATH=/
      - MQTT_BROKERS=[] # Local MQTT broker config - override with services below if using local brokers
    # Assign to the explicit internal network
    networks:
      - mqtt_viewer_net
    # Production logging configuration to prevent infinite log growth
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Rotate logs every 10MB
        max-file: "3"     # Keep maximum 3 rotated files
    # Default Dockerfile CMD ["node", "server.js"] is used
    depends_on:
      - mqtt  # [OPTIONAL] Comment out if not using local MQTT broker

  # Service 2: The MCP server (mcpServer.mjs)
  mcp:
    build:
      context: . # Uses the same image as 'app'
    container_name: korelate_mcp
    restart: always
    ports:
      - "3000:3000" # Expose MCP server on port 3000 of the host
    volumes:
      - ./data:/usr/src/app/data # Required to read data/uns_model.json
    environment:
      - NODE_ENV=production
      # --- Critical MCP Configuration ---
      - MCP_TRANSPORT=http    # Force HTTP mode
      - MCP_PORT=3000         # Define listening port
      - MAIN_APP_HOST=app     # [IMPORTANT] This is the service name 'app' above (Docker DNS)
      - PORT=8080             # The port 'app' is listening on internally
      - BASE_PATH=/
    # Assign to the explicit internal network
    networks:
      - mqtt_viewer_net
    # [UPDATED] Launch from the new interface path
    command: node interfaces/mcp/mcpServer.mjs # Overrides Dockerfile CMD
    depends_on:
      - app # Ensure 'app' starts first
    # Production logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Service 3: [OPTIONAL] Simple MQTT Broker (Mosquitto)
  # Dockerfile comment out to disable local MQTT broker and use external brokers instead
  mqtt:
    image: eclipse-mosquitto:2.0.18-alpine
    container_name: korelate_mqtt
    restart: always
    ports:
      - "1883:1883"  # MQTT port
      - "9001:9001"  # WebSocket port
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - mqtt_viewer_net
    environment:
      # Mosquitto doesn't use env vars for config, but this documents the setup
      - MOSQUITTO_BROKER_VERSION=2.0.18
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/broker/version"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Service 4: [OPTIONAL] Simple OPC UA Server
  # Uncomment to enable local OPC UA test server
  opcua:
    build:
      context: .
      dockerfile: Dockerfile.opcua
    container_name: korelate_opcua
    restart: always
    ports:
      - "4840:4840"  # OPC UA port
    environment:
      - NODE_ENV=production
      - OPCUA_PORT=4840
    networks:
      - mqtt_viewer_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "const net = require('net'); const socket = net.createConnection(4840, 'localhost'); socket.on('connect', () => {socket.destroy(); process.exit(0)}); socket.on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 3

# ----- Named Volumes for Persistence -----
volumes:
  mosquitto_data:
  mosquitto_logs:

# Define specific network settings to use RFC 6598 (CGNAT) space
# This prevents conflicts with standard 192.168.x.x or 10.x.x.x corporate networks
networks:
  mqtt_viewer_net:
    driver: bridge
    ipam:
      config:
        - subnet: 100.64.0.0/24