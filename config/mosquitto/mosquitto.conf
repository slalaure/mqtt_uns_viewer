# Mosquitto Broker Configuration - Simple Test Setup
# For development & testing purposes only

# Port for MQTT
listener 1883
protocol mqtt

# Port for WebSocket connections
listener 9001
protocol websockets

# Allow anonymous connections (for local testing)
allow_anonymous true

# Set persistence
persistence true
persistence_location /mosquitto/data/

# Enable logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Log message format
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S
