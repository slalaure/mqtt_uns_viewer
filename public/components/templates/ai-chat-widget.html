<div id="chat-widget-container" class="chat-widget-container">
    <chat-session-list></chat-session-list>
    <div class="chat-header" id="chat-header">
        <div style="display: flex; align-items: center; gap: 4px;">
            <div class="chat-controls">
                <button id="btn-chat-sessions" title="Sessions Menu"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0;"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
            </div>
            <span style="display: flex; align-items: center; font-size: 0.95em;"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; margin-left: 4px;"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg> Korelate AI</span>
        </div>
        <div class="chat-controls">
            <button id="btn-chat-clear" title="Delete Session"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
            <button id="btn-chat-minimize" title="Minimize"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
    </div>
    <div class="chat-body">
        <div id="chat-history" class="chat-history-container">
            <div class="chat-message assistant">
                Hello! I am your UNS Assistant. How can I help?
            </div>
        </div>
        
        <div id="chat-file-preview" style="display:none; padding:10px; background:var(--color-bg-accent); border-top:1px solid var(--color-border); align-items:center; gap:10px;"></div>

        <div style="display: flex; flex-direction: column; border-top: 1px solid var(--color-border);">
            <div style="display: flex; justify-content: flex-end; padding: 4px 10px 0 10px; background: var(--color-bg-secondary);">
                <select id="chat-model-select" style="max-width: 150px; font-size: 0.75em; padding: 2px 4px; border-radius: 3px; border: 1px solid var(--color-border); background: var(--color-bg-tertiary); color: var(--color-text-secondary); display: none;">
                </select>
            </div>
            <div class="chat-input-area" style="border-top: none;">
                <button id="btn-chat-attach" class="chat-icon-btn" title="Attach File"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                <button id="btn-chat-cam" class="chat-icon-btn" title="Camera"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg></button>
                <button id="btn-chat-mic" class="chat-icon-btn" title="Voice Input"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></button>
                <textarea id="chat-input" rows="1" placeholder="Ask..."></textarea>
                <button id="btn-send-chat" title="Send"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0; padding: 0;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                <button id="btn-stop-chat" style="display:none;" class="chat-icon-btn" title="Stop"><svg xmlns="http://www.w3.org/2000/svg" class="protocol-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></button>
            </div>
        </div>
    </div>
    
    <div class="chat-resize-handle chat-resize-nw"></div>
    <div class="chat-resize-handle chat-resize-n"></div>
    <div class="chat-resize-handle chat-resize-ne"></div>
    <div class="chat-resize-handle chat-resize-e"></div>
    <div class="chat-resize-handle chat-resize-se"></div>
    <div class="chat-resize-handle chat-resize-s"></div>
    <div class="chat-resize-handle chat-resize-sw"></div>
    <div class="chat-resize-handle chat-resize-w"></div>
</div>

<button id="btn-chat-fab" class="chat-fab" title="Start to Korelate, chat now" style="display:flex; justify-content:center; align-items:center; padding:0;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="32" height="32" style="margin-left: 2px;">
      <defs>
        <path id="k-shape-fab" d="M 20 15 L 70 15 L 70 65 L 120 15 L 160 15 L 85 90 L 160 165 L 120 165 L 70 115 L 70 165 L 20 165 Z" />
        <mask id="cutout-fab">
          <rect width="100%" height="100%" fill="white" />
          <circle cx="70" cy="90" r="24" fill="black" />
        </mask>
        <clipPath id="k-clip-fab">
          <use href="#k-shape-fab" />
        </clipPath>
      </defs>
      <use href="#k-shape-fab" fill="#FFFFFF" mask="url(#cutout-fab)" />
      <circle cx="70" cy="90" r="32" fill="var(--color-primary)" clip-path="url(#k-clip-fab)" />
      <circle cx="70" cy="90" r="24" fill="#E67E22" />
    </svg>
</button>

<input type="file" id="chat-file-input" style="display:none;" accept="image/*,.pdf,.txt,.json,.csv,.js">

<div id="chat-camera-modal" class="chat-camera-modal" style="display:none;">
    <div class="camera-content">
        <video id="chat-camera-feed" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="camera-btn-cancel" id="btn-cam-cancel">Cancel</button>
            <button class="camera-btn-capture" id="btn-cam-capture" title="Take Photo"></button>
        </div>
    </div>
</div>
